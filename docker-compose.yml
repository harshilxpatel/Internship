version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: internship_postgres
    environment:
      POSTGRES_DB: internship
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internship"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internship-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  internship-network:
    driver: bridge